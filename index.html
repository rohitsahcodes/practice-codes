<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Let's begin js</title>
    <!-- <script src="script.js" defer></script> -->
  </head>

  <body>
    <!-- inline html (bad practice) -->
     <button onclick="alertFunction()">Click Me1</button>
    <!-- <button onclick="console.log('Hello World!')">Click Me1</button> -->
    <button id="btn2">Click Me2</button>
    <button id="btn3">Click Me3</button>

    <script>
      // DOM property
      const btn2 = document.querySelector("#btn2");
      btn2.onclick = alertFunction;
      // btn2.onclick = () => console.log("Hello World!!");

      // addEventListener (best practice)
      const btn3 = document.querySelector("#btn3");
      btn3.addEventListener("click", alertFunction);
      // btn3.addEventListener("click", () => console.log("Hello World!!!"));
      

      function alertFunction(){
        alert("YAY! YOU DID IT!");
      }
    </script>
  </body>
</html>
