<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Let's begin js</title>
    <!-- <script src="script.js" defer></script> -->
  </head>

  <body>
    <h1>THE TITLE OF YOUR WEBPAGE</h1>
    <hr />
    <div id="container"></div>
    <hr />

    <script>
      // your JavaScript file
      const container = document.querySelector("#container");

      const content = document.createElement("div");
      content.classList.add("content");
      content.textContent = "This is the glorious text-content!";

      container.appendChild(content);

      //my code goes here.. 
      const para = document.createElement("p"); //add this in container
      para.textContent = "Hey I'm red!";
      para.style.color = "red";
      container.appendChild(para);

      const h3 = document.createElement("h3"); //add this in container
      h3.textContent = "I'm a blue h3!";
      h3.style.color = "blue";
      container.appendChild(h3);

      const content1 = document.createElement("div"); //add this in container
      content1.setAttribute("style", "border: 2px solid black; background-color: pink");
      
      const h1 = document.createElement("h1"); //add this in content1
      h1.textContent = "I'm in a div";
      content1.appendChild(h1);
      content1.appendChild(h1);
      
      const divPara = document.createElement("p"); //add this in content1
      divPara.textContent = "ME TOO!";
      content1.appendChild(divPara);
      

      container.appendChild(content1);
    </script>
  </body>
</html>
