<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple DOM example</title>
    <style>
      .highlight {
        color: white;
        background-color: black;
        padding: 10px;
        width: 250px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>My shopping list</h1>
    <div class="enterAddItems">
      Enter a new item:
      <input type="text" id="item" />
      <button id="btn">Add item</button>
    </div>
    <ul></ul>

    <script>
      const item = document.querySelector("#item");
      const btn = document.querySelector("#btn");

      const ul = document.querySelector("ul");

      //also execute click function when entered "Enter" key..
      item.addEventListener("keydown", (e)=>{
        if (e.key === "Enter"){
          btn.click();
        }
      });
      
      //click function 
      btn.addEventListener("click", ()=> {
        // console.log(item.value);
        const newItems = item.value + "  ";

        const newList = document.createElement("li");
        newList.textContent= newItems;
        // console.log(newList);

        ul.appendChild(newList);
        
        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        
        newList.appendChild(delBtn);

        item.value = "";

        newList.style.paddingBottom= "10px";

        //to delete the specific list item using delete button
        delBtn.addEventListener("click",()=>{
          newList.remove();
        })

        //to get focus back on input.. 
        item.focus();
      })

    </script>
  </body>
</html>
