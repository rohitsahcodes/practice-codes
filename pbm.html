<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice padding, boarder, margin</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            border: solid 1px;

        }
        .box-1{
            padding: 10px;
            border: solid 10px rgb(233, 85, 110);
            height: 100px;
            width: 100px;
            margin: 50px;
            box-sizing: border-box;
           }

        .box-2{
            margin: 10px;

        }

        .box-3{
            height: 300px;
            width: 700px;
            box-sizing: border-box;

            padding: 50px;
            border: solid 50px;

        }

    </style>
</head>
<body>
    <div class="box-1">Box 1</div>
    <div class="box-2">Box 2</div>
    <div class="box-3"> Box 3</div>
    
</body>
</html>

<!-- box-sizing: border-box; means padding and border include in height -->
