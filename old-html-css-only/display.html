<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <style>
        *{
            /* outline: solid 2px blue; */
        }
        .boxx{
            display: none;
            background-color: aquamarine;
        }
        .box-1{
            display: inline-block; 
            background-color: blue;    
            height: 35px;
            width: 40px; 
            padding: 10px;   
            border: solid 1px;    

        }
        .box-2{
            display: inline;
            background-color: aqua;
            height: 35px;
            width: 40px;
            padding: 10px;
            border: solid 1px;

        }
        .box-3{
            display: inline;
            background-color: blueviolet;

        }
        .hello{
            display: inline;
            background-color: lightgreen;
        }
        span{
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <div class="box-1"><div class="boxx">Boxx</div>Box 1</div>
    <div class="box-2">Box 2</div>
    <div class="box-3">Box 3</div>
    <div class="hello">hello</div>
    <span>hi</span>
    
</body>
</html>
